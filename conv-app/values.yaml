app:
  imagePullPolicy: Always
  host: conv.test
  replicas: 1
  name: conv-app
  version: "1.2"
  image: antonlarichev/conv-app
  components: frontend
  port: 80
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 128Mi
    cpu: 250m
  env:
    configMapKeyRef:
      name: conv-app-configmap
      key: VITE_DOMAIN

api:
  imagePullPolicy: Always
  host: conv.test
  replicas: 1
  name: conv-api
  version: "1.0"
  image: antonlarichev/conv-api
  components: backend
  port: 3000
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 128Mi
    cpu: 250m
  envs:
    - RABBITMQ_DEFAULT_USER
    - RABBITMQ_DEFAULT_PASS
    - AMQP_EXCHANGE
    - AMQP_HOSTNAME
    - AMQP_USER
    - AMQP_PASSWORD
  volumes:
    - name: app-data
      claimName: app-pvc
  volumeMounts:
    - name: app-data
      mountPath: /opt/app/uploads

configmap:
  name: conv-app-configmap
  VITE_DOMAIN: "http://conv.test"

ingress:
  port1: 80
  port2: 3000
  port3: 3000

converter:
  imagePullPolicy: Always
  host: conv.test
  replicas: 1
  name: converter
  version: "1.0"
  image: antonlarichev/conv-service
  components: converter-api
  port: 3001
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 128Mi
    cpu: 100m
  envs:
  - RABBITMQ_DEFAULT_USER
  - RABBITMQ_DEFAULT_PASS
  - AMQP_EXCHANGE
  - AMQP_HOSTNAME
  - AMQP_USER
  - AMQP_PASSWORD

rabbitmq:
  imagePullPolicy: Always
  host: conv.test
  replicas: 1
  name: rabbitmq
  version: 3.12-management-alpine
  image: rabbitmq
  components: rabbitmq
  ports:
  - name: amqp
    containerPort: 5672
    protocol: TCP
  - name: management
    containerPort: 15672
    protocol: TCP
  - name: epmd
    containerPort: 4369
    protocol: TCP
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 100m
  envs:
    - RABBITMQ_DEFAULT_USER
    - RABBITMQ_DEFAULT_PASS
  volumes:
    - name: app-data
      claimName: app-pvc
  volumeMounts:
    - name: app-data
      mountPath: /opt/app/uploads
