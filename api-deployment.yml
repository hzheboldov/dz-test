apiVersion: apps/v1
kind: Deployment
metadata:
  name: conv-api-deployment
spec:
  selector:
    matchLabels:
      components: backend
  replicas: 1
  template:
    metadata:
      labels:
        components: backend
    spec:
      containers:
      - name: conv-api
        image: antonlarichev/conv-api:1.0
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 3000
        env:
          - name: RABBITMQ_DEFAULT_USER
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: RABBITMQ_DEFAULT_USER
          - name: RABBITMQ_DEFAULT_PASS
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: RABBITMQ_DEFAULT_PASS
          - name: AMQP_EXCHANGE
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: AMQP_EXCHANGE
          - name: AMQP_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: AMQP_HOSTNAME
          - name: AMQP_USER
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: AMQP_USER
          - name: AMQP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: conv-api-secret
                key: AMQP_PASSWORD
        volumeMounts:
          - name: app-data
            mountPath: /opt/app/uploads
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-pvc
